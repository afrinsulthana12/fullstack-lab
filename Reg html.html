<!DOCTYPE html>
<html>
<head>
    <title>Registration Form - Step 1</title>
</head>
<body>

    <h2>Registration - Step 1: Basic Info</h2>

    <!-- When this form is submitted, the browser loads 'register_page2.html' -->
    <form action="register_page2.html" method="get">
        <label for="full_name">Full Name:</label><br>
        <input type="text" id="full_name" name="full_name" required><br><br>

        <label for="email_id">Email ID:</label><br>
        <input type="email" id="email_id" name="email_id" required><br><br>

        <button type="submit">Go to Step 2</button>
    </form>

</body>
</html>
